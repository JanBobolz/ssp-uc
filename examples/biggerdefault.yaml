---
boxes:
  - name: Env
    session: []
    parties: ["*"]
    methods: 
      - name: main
        parties: []
    handlers: [relayToEnv]

  - name: Pi Issuer
    session: [main]
    parties:
      - honest iss
    methods:
      - name: issueCred
        parties: [honest iss]

  - name: Pi User
    session: [main]
    parties:
      - honest user
    methods:
      - name: receiveCred
        parties: [honest user]

  - name: Channel 1
    session: [main, ch1]
    parties:
      - iss
      - user
    methods:
      - name: send
        parties: ["iss", "user"]
      - name: receive
        parties: ["iss", "user"]
    events: 
      - name: onSend

  - name: Channel 2
    session: [main, ch2]
    parties:
      - iss
      - user
    methods:
      - name: send
        parties: ["iss", "user"]
      - name: receive
        parties: ["iss", "user"]
    events: 
      - name: onSend

  - name: Adversary
    session: [main]
    parties:
      - corrupt iss
      - corrupt user
      - corrupt adv
    methods:
      - name: handleEnvCommand
        parties: [corrupt adv]
    events: 
      - name: relayToEnv
    handlers: [onSend]

  - name: ROM
    session: [ROM1]
    parties: []
    methods:
      - name: eval
        parties: ["*"]
        session: ["*", "ROM1"]

settings:
  boxwidth: 12
  boxmargin: 1
  layerheight: 10
  showallarrows: false
