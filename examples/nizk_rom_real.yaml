---
boxes:
  - name: Env
    session: []
    parties: ["*"]
    methods: 
      - name: main
        parties: []
    handlers: [relayToEnv]

  - name: NIZK Prover
    session: [main]
    parties:
      - honest prover
    methods:
      - name: prove
        parties: [honest prover]

  - name: NIZK Verifier
    session: [main]
    parties:
      - honest verifier
    methods:
      - name: verify
        parties: [honest verifier]

  - name: Adversary
    session: [main]
    parties:
      - corrupt adv
      - corrupt prover
      - corrupt verifier
    events: 
      - name: relayToEnv
    methods: 
      - name: handleEnvCommand
        parties: [corrupt adv]

  - name: G-ROM
    session: [GROM]
    parties: []
    methods:
      - name: eval
        parties: ["*"]
        session: ["*", "GROM"]
      - name: observe
        parties: ["*"]
        session: ["*", "GROM"]

settings:
  boxwidth: 9
  boxmargin: 1
  layerheight: 6
  showallarrows: false
