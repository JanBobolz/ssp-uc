---
boxes:
  - name: Env
    session: []
    parties: ["*"]
    methods: 
      - name: main
        caller-parties: []
        caller-session: []
    handlers: [relayToEnv]

  - name: F-NIZK
    session: [main]
    parties:
      - prover
      - verifier
    methods:
      - name: prove
        caller-parties: [honest prover]
      - name: verify
        caller-parties: [honest verifier]
    events:
      - name: onProve
      - name: onVerify

  - name: Sim
    session: [main]
    parties:
      - adv
      - prover
      - verifier
    methods: 
      - name: handleEnvCommand
        caller-parties: [corrupt adv]
    handlers:
      - onProve
      - onVerify
        

  - name: G-ROM
    session: [GROM]
    parties: []
    methods:
      - name: eval
        caller-parties: ["*"]
        session: ["*", "GROM"]
      - name: observe
        caller-parties: ["*"]
        session: ["*", "GROM"]

settings:
  boxwidth: 12
  boxmargin: 1.4
  layerheight: 8
  showallarrows: false
