---
boxes:
  - name: Pi cred Issuer
    session: [mainSession]
    parties:
      - honest issuer
    methods:
      - name: issueCred
        caller-parties: [issuer]
        caller-session: []
  - name: Pi cred Receiver
    session: [mainSession]
    parties:
      - honest receiver
    methods:
      - name: receiveCred
        caller-parties: 
          - receiver
        caller-session: []
  - name: Communication Channel
    session: [mainSession, comms1]
    parties:
      - honest issuer
      - corrupt issuer
      - honest receiver
      - corrupt receiver
    methods:
      - name: send
        caller-parties: [issuer]
        caller-session: [mainSession]
  - name: Adversary
    session: [mainSession]
    parties:
      - corrupt issuer
      - corrupt receiver
    methods:
      - name: handleSend
        caller-parties: ["*"]
        caller-session: [mainSession, comms1]
        async: true
  - name: ROM
    session: [globalROMsession1]
    parties: []
    methods:
      - name: eval
        caller-parties: ["*"]
        caller-session: ["*"]
