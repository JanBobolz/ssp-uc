  <body>
    <h1>SSP UC box drawing</h1>
    
    <!-- <section id="editor"> -->

<textarea id="yaml">
---
boxes:
  - name: Pi cred Issuer
    session: [mainSession]
    parties:
      - honest issuer
    methods:
      - name: issueCred
        party: issuer
        caller-session: []
  - name: Pi cred Receiver
    session: [mainSession]
    parties:
      - honest receiver
    methods:
      - name: receiveCred
        party: receiver
        caller-session: []
  - name: Communication Channel
    session: [mainSession, comms1]
    parties:
      - honest issuer
      - corrupt issuer
      - honest receiver
      - corrupt receiver
    methods:
      - name: send
        party: issuer
        caller-session: [mainSession]
  - name: Adversary
    session: [mainSession]
    parties:
      - corrupt issuer
      - corrupt receiver
  - name: ROM
    session: [globalROMsession1]
    parties: []
    methods:
      - name: eval
        party: "*"
        caller-session: ["*"]
</textarea>
    <button onclick="compile();" name="UpdateBtn">
    Compile
    </button><br>
    <div id="output"></div>
    <button onclick="update();" name="UpdateBtn2">
        Update Tikz
